services:
  postgres:
    image: postgres:16-alpine
    container_name: tibia-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tibia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tibia_dev_only}
      POSTGRES_DB: ${POSTGRES_DB:-tibia}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tibia} -d ${POSTGRES_DB:-tibia}"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
